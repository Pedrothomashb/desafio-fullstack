version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: weatherapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: weatherapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: weatherapp-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=weatherapp;Username=postgres;Password=postgres"
      WeatherProviders__UseProvider: "Fake"
      # To use OpenWeatherMap: set UseProvider to OpenWeatherMap and add your key:
      # WeatherProviders__UseProvider: "OpenWeatherMap"
      # WeatherProviders__OpenWeatherMap__ApiKey: "your_key_here"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: weatherapp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
